<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>马子潇 - 个人作品集</title>
  <link rel="icon" type="image/svg+xml" sizes="any" href="./favicon.svg?v=2" />
  <meta name="theme-color" content="#ff5500" />
  <style>
    /* --- 1. 全局极致主义重置 & 中度冷工业灰调体系 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #2a2a2a; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .header-identity {
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .profile-info h1 {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .profile-info h1 .brand-mark {
      display: inline-block;
      width: 1em;
      height: 1em;
      flex: 0 0 1em;
      object-fit: contain;
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover { opacity: 0.6; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 22px;
    }
    .language-switch {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #000000;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }
    .language-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .language-slider {
      width: 42px;
      height: 22px;
      position: relative;
      border: 1px solid #000000;
      border-radius: 999px;
      display: inline-block;
      flex-shrink: 0;
    }
    .language-slider::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #000000;
      transition: transform 0.25s ease;
    }
    .language-switch input:checked + .language-slider::after { transform: translateX(20px); }
    .language-switch input:focus-visible + .language-slider { outline: 2px solid #000000; outline-offset: 3px; }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #2a2a2a;
    }

    /* --- 3. 左侧选项卡栏 --- */
    .left-panel {
      width: 25%; height: 100%; display: flex; flex-direction: column; 
      overflow: visible; border-right: 1px solid #1a1a1a; background-color: #1a1a1a; 
      z-index: 50; perspective: 800px; box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3); 
    }
    
    .project-item {
      height: 16.66%; width: 108%; cursor: pointer; position: relative;
      border-bottom: 1px solid #1a1a1a; background-color: #222222; overflow: visible;
      transform: translateX(-7.4%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.3s ease;
    }
    
    .project-item:hover { transform: translateX(0); z-index: 60; box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5); }
    .project-item.active { z-index: 55; }
    
    .project-item-card {
      width: 100%; height: 100%; overflow: hidden; position: relative; transform-style: preserve-3d;
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), border 0.25s ease;
    }
    
    .project-item:hover .project-item-card, .project-item.active .project-item-card { border: 2px solid #ff5500; }
    .project-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .item-hover-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.2) 100%); 
      display: flex; justify-content: center; align-items: center; padding: 0 15px;
      text-align: center; pointer-events: none;
    }
    .project-item:hover .item-hover-overlay, .project-item.active .item-hover-overlay { background: rgba(0, 0, 0, 0.65); }
    .item-hover-overlay span { color: #ffffff; font-size: 13px; font-weight: 600; letter-spacing: 1px; }
    .project-item:hover .item-hover-overlay span, .project-item.active .item-hover-overlay span { color: #ff5500; }

    /* --- 4. 右侧展示区 --- */
    .right-panel {
      width: 75%; height: 100%; background-color: #333333; 
      overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
    }
    .right-panel::-webkit-scrollbar { width: 0px; }

    .detail-content-wrapper {
      max-width: 1180px; margin: 0 auto; padding: 58px 52px 120px;
      opacity: 1; transition: opacity 0.25s ease;
    }
    .content-fade { opacity: 0; }

    .project-title-area { margin-bottom: 26px; }
    .project-title-area h2 {
      max-width: 820px; font-size: clamp(34px, 4vw, 50px); line-height: 1.08;
      font-weight: 760; letter-spacing: -1.1px; margin-bottom: 15px; color: #ffffff;
    }
    .project-title-area .sub-tag {
      display: inline-flex; align-items: center; min-height: 28px; padding: 6px 11px;
      border: 1px solid rgba(255,85,0,.55); color: #ff8a51; background: rgba(255,85,0,.08);
      font-size: 10.5px; font-weight: 750; letter-spacing: 1.25px; text-transform: uppercase;
    }

    .project-lede {
      max-width: 860px; margin: -4px 0 30px; padding-left: 18px;
      border-left: 3px solid #ff5500;
    }
    .project-lede p {
      color: #f1f1f1; font-size: 17px; line-height: 1.72; font-weight: 560;
      letter-spacing: .02px; margin: 0;
    }

    .spec-table-mini {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px;
      margin: 14px 0 34px; background: transparent; padding: 0; border: 0;
    }
    .spec-cell {
      position: relative; min-height: 124px; padding: 19px 18px 18px;
      background: linear-gradient(145deg, #262626, #222222); border: 1px solid #484848;
      overflow: hidden; transition: border-color .25s ease, transform .25s ease;
    }
    .spec-cell::after {
      content: attr(data-index); position: absolute; top: 11px; right: 14px;
      color: rgba(255,255,255,.10); font-size: 30px; font-weight: 800; letter-spacing: -2px;
    }
    .spec-cell:hover { border-color: rgba(255,85,0,.75); transform: translateY(-2px); }
    .spec-cell h3 {
      position: relative; z-index: 1; font-size: 10px; color: #ff6a21;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 11px;
    }
    .spec-cell p {
      position: relative; z-index: 1; max-width: 92%; font-size: 13.5px;
      line-height: 1.55; color: #f0f0f0; font-weight: 560;
    }
    .spec-cell a {
      position: relative; z-index: 1; display: inline-block; margin-top: 9px;
      color: #ff7b3a; font-size: 10.5px; font-weight: 700; text-decoration: none;
      border-bottom: 1px solid rgba(255,85,0,.55);
    }
    .spec-cell a:hover { color: #ff9a69; border-bottom-color: #ff9a69; }

    .detail-section { margin-bottom: 65px; }
    .content-intro { margin-bottom: 42px; }
    .content-heading {
      scroll-margin-top: 92px; font-size: 24px; line-height: 1.35; font-weight: 720;
      letter-spacing: -.25px; margin: 66px 0 23px; padding: 0 0 14px 16px;
      max-width: 780px; border-left: 4px solid #ff5500;
      border-bottom: 1px solid #4a4a4a; color: #ffffff;
    }
    .content-heading.content-subheading {
      font-size: 19px; margin-top: 42px; padding-bottom: 0; border-bottom: 0;
      border-left-width: 2px; color: #f1f1f1;
    }
    .content-heading.content-tertiary-heading {
      font-size: 16.5px; margin: 34px 0 17px; padding: 0 0 0 14px;
      border-left: 1px solid #ff6a21; border-bottom: 0; color: #ededed;
    }
    .detail-section > .content-heading:first-child { margin-top: 0; }
    .detail-section p {
      max-width: 780px; font-size: 15.5px; line-height: 1.92; letter-spacing: .05px;
      color: #d2d2d2; margin: 0 0 24px; text-align: left;
    }
    .detail-section strong { color: #ffffff; font-weight: 700; }

    .project-reading-layout { display: block; }
    .quick-nav {
      position: fixed;
      top: calc(50vh + 45px);
      right: max(22px, calc((75vw - 1180px) / 2 + 20px));
      z-index: 40;
      display: flex; flex-direction: column; align-items: stretch; gap: 13px;
      width: clamp(176px, 13vw, 218px); max-height: calc(100vh - 150px);
      margin: 0; padding: 17px 14px 15px;
      overflow: hidden; background: #252525;
      border: 1px solid #494949; border-left: 2px solid #ff5500;
      box-shadow: 0 12px 32px rgba(0,0,0,.30);
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: translateY(-50%) translateX(12px);
      transition: opacity .22s ease, transform .22s ease, visibility 0s linear .22s;
    }
    .quick-nav.is-visible {
      opacity: 1; visibility: visible; pointer-events: auto;
      transform: translateY(-50%) translateX(0);
      transition-delay: 0s;
    }
    .quick-nav-title {
      display: flex; align-items: center; flex: 0 0 auto; gap: 9px; margin: 0 2px;
      color: #ffffff; font-size: 11px; font-weight: 750; letter-spacing: 1.2px; text-transform: uppercase;
    }
    .quick-nav-title::before { content: ""; width: 16px; height: 1px; background: #ff5500; }
    .quick-nav-links {
      display: flex; flex: 1 1 auto; flex-direction: column; align-items: stretch; gap: 3px;
      min-width: 0; overflow-x: hidden; overflow-y: auto; scrollbar-width: none;
    }
    .quick-nav-links::-webkit-scrollbar { display: none; }
    .quick-nav a {
      display: block; flex: 0 0 auto; padding: 7px 9px; color: #bdbdbd;
      background: transparent; border: 1px solid transparent;
      text-decoration: none; white-space: normal; font-size: 11.5px; line-height: 1.45; transition: .2s ease;
    }
    .quick-nav a:hover, .quick-nav a.active {
      color: #ff6b24; border-color: rgba(255,85,0,.48); background: rgba(255,85,0,.08);
    }
    .quick-nav a.toc-depth-3 { padding-left: 18px; color: #a6a6a6; font-size: 10.8px; }
    .quick-nav a.toc-depth-4 { padding-left: 27px; color: #8f8f8f; font-size: 10.2px; }

    .rich-list, .numbered-list {
      max-width: 780px; margin: -8px 0 28px; padding: 0; list-style: none;
    }
    .rich-list li, .numbered-list li {
      position: relative; padding: 9px 12px 9px 24px; color: #d3d3d3;
      font-size: 15px; line-height: 1.72; border-bottom: 1px solid rgba(255,255,255,.065);
    }
    .rich-list li::before {
      content: ""; position: absolute; left: 6px; top: 20px; width: 5px; height: 5px; background: #ff5500;
    }
    .numbered-list { counter-reset: ordered; }
    .numbered-list li { counter-increment: ordered; padding-left: 42px; }
    .numbered-list li::before {
      content: counter(ordered, decimal-leading-zero); position: absolute; left: 4px; top: 10px;
      color: #ff6b24; font-size: 10px; font-weight: 750; letter-spacing: .5px;
    }
    .insight-card {
      max-width: 780px; margin: 6px 0 30px; padding: 22px 24px 18px;
      background: #292929; border: 1px solid #474747; border-left: 3px solid #ff5500;
    }
    .insight-card-title { margin-bottom: 12px; color: #ffffff; font-size: 15px; font-weight: 720; }
    .insight-card .rich-list { margin: 0; }
    .insight-card .rich-list li:last-child { border-bottom: 0; }
    .bullet-card {
      max-width: 780px; margin: -7px 0 30px; padding: 8px 18px 5px;
      background: #292929; border: 1px solid #474747; border-left: 3px solid #ff5500;
    }
    .bullet-card .rich-list { margin: 0; }
    .bullet-card .rich-list li:last-child { border-bottom: 0; }

    .content-table-wrap {
      width: 100%; max-width: 780px; margin: 4px 0 36px;
      overflow-x: auto; border: 1px solid #484848;
    }
    .content-table { width: 100%; min-width: 620px; border-collapse: collapse; background: #292929; }
    .content-table th {
      padding: 13px 15px; background: #222; color: #ff6b24; font-size: 11px;
      font-weight: 750; letter-spacing: .7px; text-align: left; border-bottom: 1px solid #555;
    }
    .content-table td {
      padding: 14px 15px; color: #d2d2d2; font-size: 13.5px; line-height: 1.65;
      vertical-align: top; border-right: 1px solid #444; border-bottom: 1px solid #414141;
    }
    .content-table th:last-child, .content-table td:last-child { border-right: 0; }
    .content-table tbody tr:last-child td { border-bottom: 0; }

    .timeline { position: relative; max-width: 780px; margin: 8px 0 42px; padding: 2px 0 1px 24px; }
    .timeline::before { content: ""; position: absolute; left: 5px; top: 8px; bottom: 8px; width: 1px; background: #565656; }
    .timeline-legend {
      display: flex; flex-wrap: wrap; gap: 14px; margin: 0 0 22px; padding: 9px 12px;
      color: #8f8f8f; background: #292929; border: 1px solid #444;
      font-size: 10px; letter-spacing: .7px; text-transform: uppercase;
    }
    .timeline-item { position: relative; display: grid; grid-template-columns: 170px 1fr; gap: 20px; padding: 0 0 28px; }
    .timeline-item::before {
      content: ""; position: absolute; left: -24px; top: 7px; width: 11px; height: 11px;
      background: #333; border: 2px solid #ff5500; border-radius: 50%;
    }
    .timeline-key { color: #fff; font-size: 13.5px; line-height: 1.5; font-weight: 680; }
    .timeline-date { display: block; margin-top: 4px; color: #ff7432; font-size: 10.5px; letter-spacing: .55px; }
    .timeline-copy { color: #cfcfcf; font-size: 13.5px; line-height: 1.72; }
    .timeline-extra { display: block; margin-top: 5px; color: #9d9d9d; font-size: 12px; }

    /* About Me：游戏时长分布图 */
    .playtime-chart {
      width: 100%; max-width: 780px; margin: 8px 0 42px;
      background: #292929; border: 1px solid #484848; border-top: 2px solid #ff5500;
    }
    .playtime-chart-header {
      display: flex; align-items: baseline; justify-content: space-between; gap: 18px;
      padding: 17px 19px 15px; border-bottom: 1px solid #454545;
    }
    .playtime-chart-title { color: #ffffff; font-size: 13.5px; font-weight: 720; }
    .playtime-chart-note { color: #909090; font-size: 10px; letter-spacing: .35px; }
    .playtime-chart-row {
      display: grid; grid-template-columns: 82px minmax(0, 1fr); gap: 17px;
      padding: 13px 18px; border-bottom: 1px solid rgba(255,255,255,.065);
    }
    .playtime-chart-row:last-child { border-bottom: 0; }
    .playtime-chart-metric {
      display: flex; align-items: baseline; justify-content: flex-end; gap: 4px;
      padding-top: 1px; white-space: nowrap;
    }
    .playtime-chart-metric strong {
      color: #ff6b24; font-size: 15px; line-height: 1; font-weight: 780; letter-spacing: -.15px;
    }
    .playtime-chart-metric span { color: #8e8e8e; font-size: 9.5px; text-transform: uppercase; }
    .playtime-chart-body { min-width: 0; }
    .playtime-chart-bar {
      width: 100%; height: 4px; margin: 4px 0 10px; overflow: hidden; background: #414141;
    }
    .playtime-chart-bar span {
      display: block; width: var(--playtime-width); height: 100%; background: #ff5500;
    }
    .playtime-chart-games { display: flex; flex-wrap: wrap; gap: 6px; }
    .playtime-chart-game {
      display: inline-flex; align-items: center; min-height: 25px; padding: 5px 8px;
      color: #d8d8d8; background: #242424; border: 1px solid #454545;
      font-size: 11px; line-height: 1.35;
    }

    /* 图片展示列表样式 */
    .image-gallery {
      display: flex; flex-direction: column; gap: 20px;
      width: 100%; max-width: 780px; min-height: 50px;
    }
    .showcase-block {
      width: 100%; border: 1px solid #444444; background: #222222;
      overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.22);
    }
    .showcase-block img { width: 100%; display: block; height: auto; }
    .showcase-caption { font-size: 11.5px; color: #999999; text-align: center; margin-top: 10px; margin-bottom: 42px; }
    .reading-media-slot {
      width: 100%; max-width: 780px;
    }
    .detail-section .showcase-block,
    .detail-section .showcase-caption { width: 100%; max-width: 780px; }
    .detail-section .showcase-image,
    .detail-section .showcase-image-caption {
      width: 66.6667%; max-width: 520px; margin-left: auto; margin-right: auto;
    }
    .detail-section .showcase-block iframe {
      display: block; width: 100%; max-width: 100%; height: auto; aspect-ratio: 16 / 9;
    }

    /* Figure 12–19：单图切换画廊 */
    .media-carousel {
      width: 66.6667%; max-width: 520px; margin: 8px auto 46px;
    }
    .media-carousel-stage {
      position: relative; overflow: hidden; background: #222222;
      border: 1px solid #444444; box-shadow: 0 8px 30px rgba(0,0,0,0.22);
    }
    .media-carousel-stage img {
      display: block; width: 100%; height: auto; min-height: 1px;
    }
    .media-carousel-arrow {
      position: absolute; top: 50%; z-index: 2; width: 42px; height: 58px;
      display: grid; place-items: center; border: 1px solid rgba(255,255,255,.35);
      background: rgba(20,20,20,.74); color: #ffffff; font-size: 25px; line-height: 1;
      cursor: pointer; transform: translateY(-50%); transition: .2s ease;
    }
    .media-carousel-arrow:hover,
    .media-carousel-arrow:focus-visible {
      color: #ff6b24; border-color: #ff6b24; background: rgba(20,20,20,.92); outline: 0;
    }
    .media-carousel-prev { left: 12px; }
    .media-carousel-next { right: 12px; }
    .media-carousel-caption {
      min-height: 18px; margin: 10px 0 12px; color: #999999;
      font-size: 11.5px; line-height: 1.5; text-align: center;
    }
    .media-carousel-thumbs {
      display: flex; gap: 8px; width: 100%; padding: 2px 0 5px;
      overflow-x: auto; scrollbar-width: thin; scrollbar-color: #666 #292929;
    }
    .media-carousel-thumb {
      flex: 0 0 72px; padding: 0; overflow: hidden; aspect-ratio: 16 / 9;
      border: 1px solid #4c4c4c; background: #222222; cursor: pointer;
      opacity: .58; transition: opacity .2s ease, border-color .2s ease, transform .2s ease;
    }
    .media-carousel-thumb img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .media-carousel-thumb:hover { opacity: .9; }
    .media-carousel-thumb.is-active {
      opacity: 1; border-color: #ff5500; transform: translateY(-2px);
    }
    .media-carousel-thumb:focus-visible { outline: 2px solid #ff5500; outline-offset: 2px; }

    /* Figure 20–25：两列 GIF 展示 */
    .media-pair-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px 18px;
      width: 100%; max-width: 780px; margin: 8px 0 46px;
    }
    .media-triple-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .media-pair-item { min-width: 0; }
    .media-pair-grid .showcase-block {
      width: 100%; max-width: none; margin: 0; box-shadow: 0 8px 30px rgba(0,0,0,0.22);
    }
    .media-pair-grid .showcase-caption {
      width: 100%; max-width: none; margin: 9px 0 0; line-height: 1.5;
    }

    .about-page .project-title-area { margin-bottom: 30px; }
    .about-intro {
      display: grid; grid-template-columns: minmax(220px, 36%) 1fr; gap: 34px;
      align-items: stretch; margin-bottom: 46px;
    }
    .about-photo { min-height: 360px; margin: 0; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .about-copy {
      display: flex; flex-direction: column; justify-content: center; padding: 31px 32px;
      background: #292929; border: 1px solid #484848; border-top: 2px solid #ff5500;
    }
    .about-copy p { max-width: none; margin-bottom: 17px; font-size: 15px; line-height: 1.85; }
    .about-copy p:last-child { margin-bottom: 0; color: #fff; font-weight: 650; }
    .about-copy .resume-btn-container {
      margin: 24px 0 0; padding-top: 22px; border-top: 1px solid #474747;
    }
    .about-copy .resume-btn { padding: 12px 18px; font-size: 12.5px; }
    .about-page .content-heading { margin-top: 54px; }

    /* 简历按钮 */
    .resume-btn-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
    .resume-btn {
      display: inline-flex; align-items: center; gap: 10px; background-color: #ff5500;
      color: #000; text-decoration: none; font-size: 14px; font-weight: 700; padding: 14px 28px;
      border: 1px solid #ff5500; transition: all 0.25s ease; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.16);
    }
    .resume-btn:hover { background-color: transparent; color: #ff5500; border: 1px solid #ff5500; }

  <script>
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    }

    function safeHeroWidth(value) {
      return /^(?:(?:100|[1-9]?\d)%|\d{2,4}px)$/.test(String(value || '')) ? String(value) : '';
    }

    function plainParagraph(text) {
      return `<p>${escapeHtml(text).replace(/\n/g, '<br>')}</p>`;
    }

    function splitNonEmptyLines(text) {
      return String(text || '').split('\n').map(line => line.trim()).filter(Boolean);
    }

    function headingDepth(block) {
      const explicitLevel = Number(block && block.level);
      if (explicitLevel >= 3) return Math.min(explicitLevel, 4);
      return /^(?:\d+[.、]|[一二三四五六七八九十]+[.、])\s*/.test(String(block && block.text || '')) ? 3 : 2;
    }

    function headingBlock(text, id, depth) {
      const className = depth >= 4
        ? 'content-heading content-tertiary-heading'
        : depth === 3 ? 'content-heading content-subheading' : 'content-heading';
      const tagName = depth >= 4 ? 'h5' : depth === 3 ? 'h4' : 'h3';
      return `<${tagName} class="${className}" id="${escapeHtml(id)}">${escapeHtml(text)}</${tagName}>`;
    }

    function listHtml(lines, ordered = false) {
      const items = lines.map(line => {
        const clean = ordered ? line.replace(/^\d+[.、]\s*/, '') : line.replace(/^•\s*/, '');
        return `<li>${escapeHtml(clean)}</li>`;
      }).join('');
      return ordered ? `<ol class="numbered-list">${items}</ol>` : `<ul class="rich-list">${items}</ul>`;
    }

    function timelineHtml(rows, sectionTitle) {
      const educationTimeline = /学习与实习经历|Education & Experience/i.test(sectionTitle);
      const firstCell = (rows[0] && rows[0][0] || '').trim();
      const hasHeader = /^(?:阶段|Stage|时间|Time)$/i.test(firstCell);
      const legend = hasHeader
        ? `<div class="timeline-legend">${rows[0].map(cell => `<span>${escapeHtml(cell)}</span>`).join('')}</div>`
        : '';
      const entries = (hasHeader ? rows.slice(1) : rows).map(cells => {
        const key = educationTimeline ? (cells[1] || '') : (cells[0] || '');
        const date = educationTimeline ? (cells[0] || '') : (cells[1] || '');
        const copy = cells[2] || '';
        const extra = cells.slice(3).filter(Boolean).join(' · ');
        return `<div class="timeline-item">
          <div class="timeline-key">${escapeHtml(key)}${date ? `<span class="timeline-date">${escapeHtml(date)}</span>` : ''}</div>
          <div class="timeline-copy">${escapeHtml(copy)}${extra ? `<span class="timeline-extra">${escapeHtml(extra)}</span>` : ''}</div>
        </div>`;
      }).join('');
      return `<div class="timeline">${legend}${entries}</div>`;
    }

    function tableHtml(rows) {
      if (!rows.length) return '';
      const header = rows[0];
      const width = Math.max(...rows.map(row => row.length));
      const normalized = rows.map(row => Array.from({ length: width }, (_, index) => row[index] || ''));
      const headHtml = normalized[0].map(cell => `<th>${escapeHtml(cell)}</th>`).join('');
      const bodyHtml = normalized.slice(1).map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('');
      return `<div class="content-table-wrap"><table class="content-table"><thead><tr>${headHtml}</tr></thead>${bodyHtml ? `<tbody>${bodyHtml}</tbody>` : ''}</table></div>`;
    }

    function richParagraphHtml(text, sectionTitle) {
      const lines = splitNonEmptyLines(text);
      if (!lines.length) return '';

      const chartDirective = lines[0].match(/^@\[playtime-chart\]\((zh|en)\)$/i);
      if (chartDirective) return playtimeChartHtml(lines.slice(1), chartDirective[1].toLowerCase());

      if (lines.every(line => line.includes('｜'))) {
        const rows = lines.map(line => line.split('｜').map(cell => cell.trim()));
        if (/时间线|Timeline|学习与实习经历|Education & Experience/i.test(sectionTitle)) {
          return timelineHtml(rows, sectionTitle);
        }
        return tableHtml(rows);
      }

      if (lines.every(line => /^•\s*/.test(line))) return listHtml(lines);
      if (lines.every(line => /^\d+[.、]\s*/.test(line))) return listHtml(lines, true);

      if (lines.length > 1 && !/^•\s*/.test(lines[0]) && lines.slice(1).every(line => /^•\s*/.test(line)) && /推动核心玩法迭代|Driving Iteration on the Core Gameplay/i.test(sectionTitle)) {
        return `${plainParagraph(lines[0])}<div class="bullet-card">${listHtml(lines.slice(1))}</div>`;
      }

      if (lines.length > 1 && !/^•\s*/.test(lines[0]) && lines.slice(1).every(line => /^•\s*/.test(line))) {
        return `<div class="insight-card"><div class="insight-card-title">${escapeHtml(lines[0])}</div>${listHtml(lines.slice(1))}</div>`;
      }

      if (lines.length > 1 && !/^\d+[.、]\s*/.test(lines[0]) && lines.slice(1).every(line => /^\d+[.、]\s*/.test(line))) {
        return `${plainParagraph(lines[0])}${listHtml(lines.slice(1), true)}`;
      }

      return plainParagraph(text);
    }

    function playtimeChartHtml(lines, language) {
      const isEnglish = language === 'en';
      const rows = lines.map(line => {
        const divider = line.indexOf('｜');
        if (divider < 1) return null;
        const tier = line.slice(0, divider).trim();
        const games = line.slice(divider + 1).split('；').map(game => game.trim()).filter(Boolean);
        const hours = Number.parseFloat(tier);
        if (!Number.isFinite(hours) || !games.length) return null;
        const width = Math.max(12, Math.log10(hours + 1) / Math.log10(1001) * 100);
        return { tier, games, width };
      }).filter(Boolean);

      if (!rows.length) return '';
      const title = isEnglish ? 'Playtime Distribution' : '游戏时长分布';
      const note = isEnglish ? 'Logarithmic scale · “+” means at least' : '对数刻度 · “+”表示至少';
      const hourLabel = isEnglish ? 'hrs' : '小时';
      const rowHtml = rows.map(row => {
        const games = row.games.map(game => `<span class="playtime-chart-game">${escapeHtml(game)}</span>`).join('');
        return `<div class="playtime-chart-row">
          <div class="playtime-chart-metric"><strong>${escapeHtml(row.tier)}</strong><span>${hourLabel}</span></div>
          <div class="playtime-chart-body">
            <div class="playtime-chart-bar" aria-hidden="true"><span style="--playtime-width:${row.width.toFixed(1)}%"></span></div>
            <div class="playtime-chart-games">${games}</div>
          </div>
        </div>`;
      }).join('');
      return `<div class="playtime-chart" aria-label="${escapeHtml(title)}">
        <div class="playtime-chart-header"><div class="playtime-chart-title">${escapeHtml(title)}</div><div class="playtime-chart-note">${escapeHtml(note)}</div></div>
        ${rowHtml}
      </div>`;
    }

    function imageBlock(image, isHero = false) {
      const width = isHero ? safeHeroWidth(image.width) : '';
      const style = width ? ` style="max-width:${width}; margin-left:auto; margin-right:auto;"` : '';
      const loading = isHero ? 'eager' : 'lazy';
      const heroClass = isHero ? ' showcase-hero' : '';
      const media = `<div class="showcase-block showcase-image${heroClass}"${style}><img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.caption)}" loading="${loading}"></div><div class="showcase-caption showcase-image-caption${heroClass}"${style}>${escapeHtml(image.caption)}</div>`;
      return isHero ? media : `<div class="reading-media-slot">${media}</div>`;
    }

    function videoBlock(video) {
      const params = new URLSearchParams({ rel: '0', playsinline: '1', modestbranding: '1' });
      if (location.protocol === 'http:' || location.protocol === 'https:') params.set('origin', location.origin);
      const source = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(video.id)}?${params.toString()}`;
      return `<div class="showcase-block showcase-video"><iframe src="${source}" width="100%" height="450" title="${escapeHtml(video.caption)}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div><div class="showcase-caption showcase-video-caption">▶ ${escapeHtml(video.caption)}</div>`;
    }

    function figureNumber(block) {
      if (!block || block.kind !== 'image') return 0;
      const match = String(block.caption || '').match(/^Figure\s+(\d+)\s*[:：]/i);
      return match ? Number(match[1]) : 0;
    }

    function isWayOfWaterPair(blocks, startIndex) {
      const first = blocks[startIndex];
      const second = blocks[startIndex + 1];
      return first?.kind === 'image'
        && second?.kind === 'image'
        && /figure-42-the-way-of-water-screenshot-1\.jpg$/i.test(String(first.src || ''))
        && /figure-45-the-way-of-water-screenshot-4\.jpg$/i.test(String(second.src || ''));
    }

    function collectFigureRange(blocks, startIndex, firstFigure, lastFigure) {
      const images = [];
      for (let number = firstFigure; number <= lastFigure; number += 1) {
        const block = blocks[startIndex + number - firstFigure];
        if (figureNumber(block) !== number) return [];
        images.push(block);
      }
      return images;
    }

    function mediaCarouselBlock(images) {
      if (!images.length) return '';
      const first = images[0];
      const thumbs = images.map((image, index) => `<button class="media-carousel-thumb${index === 0 ? ' is-active' : ''}" type="button" data-gallery-index="${index}" data-gallery-src="${escapeHtml(image.src)}" data-gallery-caption="${escapeHtml(image.caption)}" aria-label="${escapeHtml(image.caption)}" aria-selected="${index === 0 ? 'true' : 'false'}"><img src="${escapeHtml(image.src)}" alt="" loading="lazy"></button>`).join('');
      return `<div class="reading-media-slot"><div class="media-carousel" data-media-carousel tabindex="0">
        <div class="media-carousel-stage">
          <img src="${escapeHtml(first.src)}" alt="${escapeHtml(first.caption)}" loading="lazy" data-gallery-image>
          <button class="media-carousel-arrow media-carousel-prev" type="button" data-gallery-prev aria-label="Previous image">‹</button>
          <button class="media-carousel-arrow media-carousel-next" type="button" data-gallery-next aria-label="Next image">›</button>
        </div>
        <div class="media-carousel-caption" data-gallery-caption>${escapeHtml(first.caption)}</div>
        <div class="media-carousel-thumbs" role="tablist" aria-label="Figure thumbnails">${thumbs}</div>
      </div></div>`;
    }

    function mediaPairGridBlock(images) {
      const items = images.map(image => `<div class="media-pair-item">${imageBlock(image)}</div>`).join('');
      return `<div class="media-pair-grid">${items}</div>`;
    }

    function mediaTripleGridBlock(images) {
      const items = images.map(image => `<div class="media-pair-item">${imageBlock(image)}</div>`).join('');
      return `<div class="media-pair-grid media-triple-grid">${items}</div>`;
    }

    function buttonsBlock(block) {
      const links = (block.links || []).map(link => `<a href="${escapeHtml(link.href)}" target="_blank" rel="noopener noreferrer" class="resume-btn">${escapeHtml(link.label)}</a>`).join(' ');
      return `<div class="resume-btn-container">${links}</div>`;
    }

    function renderBlock(block, context) {
      if (!block || !block.kind) return '';
      if (block.kind === 'heading') return headingBlock(block.text || '', context.id, context.depth || 2);
      if (block.kind === 'paragraph') return richParagraphHtml(block.text || '', context.sectionTitle || '');
      if (block.kind === 'image') return imageBlock(block);
      if (block.kind === 'youtube') return videoBlock(block);
      if (block.kind === 'buttons') return buttonsBlock(block);
      return '';
    }

    function renderContentBlocks(blocks, projectId = '') {
      let headingIndex = 0;
      let sectionTitle = '';
      const toc = [];
      const source = blocks || [];
      let html = '';
      for (let index = 0; index < source.length; index += 1) {
        const block = source[index];
        if (projectId === 'moreprojects' && isWayOfWaterPair(source, index)) {
          html += mediaPairGridBlock(source.slice(index, index + 2));
          index += 1;
          continue;
        }
        if (projectId === 'project3' && figureNumber(block) === 12) {
          const galleryImages = collectFigureRange(source, index, 12, 19);
          if (galleryImages.length) {
            html += mediaCarouselBlock(galleryImages);
            index += galleryImages.length - 1;
            continue;
          }
        }
        if (projectId === 'project3' && figureNumber(block) === 20) {
          const pairedImages = collectFigureRange(source, index, 20, 25);
          if (pairedImages.length) {
            html += mediaPairGridBlock(pairedImages);
            index += pairedImages.length - 1;
            continue;
          }
        }
        if (projectId === 'project4' && figureNumber(block) === 26) {
          const groupedImages = collectFigureRange(source, index, 26, 28);
          if (groupedImages.length) {
            html += mediaTripleGridBlock(groupedImages);
            index += groupedImages.length - 1;
            continue;
          }
        }
        if (projectId === 'project2' && figureNumber(block) === 49) {
          const appendixImages = collectFigureRange(source, index, 49, 59);
          if (appendixImages.length) {
            html += mediaPairGridBlock(appendixImages);
            index += appendixImages.length - 1;
            continue;
          }
        }
        if (block.kind === 'heading') {
          sectionTitle = block.text || '';
          const id = `section-${++headingIndex}`;
          const depth = headingDepth(block);
          toc.push({ id, text: sectionTitle, depth });
          html += renderBlock(block, { id, depth, sectionTitle });
        } else {
          html += renderBlock(block, { sectionTitle });
        }
      }
      return { html, toc };
    }

    function bindMediaCarousels(root) {
      root.querySelectorAll('[data-media-carousel]').forEach(gallery => {
        const image = gallery.querySelector('[data-gallery-image]');
        const caption = gallery.querySelector('[data-gallery-caption]');
        const thumbs = Array.from(gallery.querySelectorAll('[data-gallery-index]'));
        if (!image || !caption || !thumbs.length) return;
        let activeIndex = 0;

        const showImage = requestedIndex => {
          activeIndex = (requestedIndex + thumbs.length) % thumbs.length;
          const activeThumb = thumbs[activeIndex];
          image.src = activeThumb.dataset.gallerySrc;
          image.alt = activeThumb.dataset.galleryCaption;
          caption.textContent = activeThumb.dataset.galleryCaption;
          thumbs.forEach((thumb, index) => {
            const isActive = index === activeIndex;
            thumb.classList.toggle('is-active', isActive);
            thumb.setAttribute('aria-selected', isActive ? 'true' : 'false');
          });
          activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        };

        thumbs.forEach((thumb, index) => thumb.addEventListener('click', () => showImage(index)));
        gallery.querySelector('[data-gallery-prev]')?.addEventListener('click', () => showImage(activeIndex - 1));
        gallery.querySelector('[data-gallery-next]')?.addEventListener('click', () => showImage(activeIndex + 1));
        gallery.addEventListener('keydown', event => {
          if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
          event.preventDefault();
          showImage(activeIndex + (event.key === 'ArrowRight' ? 1 : -1));
        });
      });
    }

    function quickNavHtml(toc, label) {
      if (!toc.length) return '';
      const links = toc.map(item => `<a href="#${escapeHtml(item.id)}" class="toc-depth-${item.depth || 2}" data-section="${escapeHtml(item.id)}">${escapeHtml(item.text)}</a>`).join('');
      return `<nav class="quick-nav" aria-label="${escapeHtml(label)}"><div class="quick-nav-title">${escapeHtml(label)}</div><div class="quick-nav-links">${links}</div></nav>`;
    }

    function extractLead(blocks) {
      const source = Array.from(blocks || []);
      const headingIndex = source.findIndex(block => block.kind === 'heading' && /^(?:一句话(?:简介|介绍)|One-Sentence (?:Overview|Introduction))$/i.test(block.text || ''));
      if (headingIndex < 0) return { blocks: source, html: '' };
      let endIndex = headingIndex + 1;
      while (endIndex < source.length && source[endIndex].kind !== 'heading') endIndex += 1;
      const leadBlocks = source.slice(headingIndex + 1, endIndex);
      const html = leadBlocks.map(block => renderBlock(block, { sectionTitle: '' })).join('');
      return { blocks: source.slice(0, headingIndex).concat(source.slice(endIndex)), html };
    }

    function statusCardHtml(data, labels) {
      const status = data.status || labels.statusUnavailable;
      const link = data.statusUrl
        ? `<a href="${escapeHtml(data.statusUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(data.statusLink || labels.statusLink)} ↗</a>`
        : '';
      return `<div class="spec-cell" data-index="04"><h3>${escapeHtml(labels.status)}</h3><p>${escapeHtml(status)}</p>${link}</div>`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const projectIds = ['project3', 'project4', 'project1', 'project2', 'moreprojects', 'aboutme'];
      const interfaceText = {
        zh: {
          name: '马子潇',
          title: '关卡策划 / 游戏设计',
          projectType: '项目类型',
          responsibilities: '负责模块',
          period: '开发周期',
          status: '项目状况',
          statusLink: '查看项目页面',
          statusUnavailable: '—',
          toc: '直达目录',
          pageTitle: '马子潇 - 个人作品集',
          email: 'mazixiao2000@outlook.com',
          phone: '+86-135-0669-2801',
        },
        en: {
          name: 'Zixiao Ma',
          title: 'Level Designer / Game Designer',
          projectType: 'Project Type',
          responsibilities: 'Responsibilities',
          period: 'Development Period',
          status: 'Project Status',
          statusLink: 'View Project Page',
          statusUnavailable: '—',
          toc: 'On This Page',
          pageTitle: 'Zixiao Ma - Game Design Portfolio',
          email: 'mazixiao2000@outlook.com',
          phone: '+1-945-949-6840',
        },
      };

      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');
      const languageToggle = document.getElementById('languageToggle');
      const headerName = document.getElementById('headerName');
      const headerTitle = document.getElementById('headerTitle');
      const contactEmail = document.getElementById('contactEmail');
      const contactPhone = document.getElementById('contactPhone');
      function readSavedLanguage() {
        try { return localStorage.getItem('portfolioLanguage') === 'en' ? 'en' : 'zh'; }
        catch (error) { return 'zh'; }
      }
      function saveLanguage(language) {
        try { localStorage.setItem('portfolioLanguage', language); }
        catch (error) { /* Local file privacy settings may disable storage. */ }
      }
      let currentLanguage = readSavedLanguage();
      let currentProjectId = 'aboutme';
      let projectDatabase = {};
      let projectContent = {};
      let tocObserver = null;
      let tocVisibilityCleanup = null;

      function applyPhysics(item, card) {
        item.addEventListener('mousemove', (e) => {
          const rect = item.getBoundingClientRect();
          const xc = (e.clientX - rect.left) / rect.width - 0.5;
          const yc = (e.clientY - rect.top) / rect.height - 0.5;
          card.style.transform = `scale(1.08) rotateX(${yc * -48}deg) rotateY(${xc * 48}deg)`;
        });
        item.addEventListener('mouseleave', () => card.style.transform = 'scale(1) rotateX(0) rotateY(0)');
      }
      items.forEach(item => applyPhysics(item, item.querySelector('.project-item-card')));

      function updateInterface() {
        const labels = interfaceText[currentLanguage];
        document.documentElement.lang = currentLanguage === 'en' ? 'en' : 'zh-CN';
        document.title = labels.pageTitle;
        headerName.textContent = labels.name;
        headerTitle.textContent = labels.title;
        contactEmail.textContent = labels.email;
        contactEmail.href = `mailto:${labels.email}`;
        contactPhone.textContent = `📱 ${labels.phone}`;
        languageToggle.checked = currentLanguage === 'en';

        items.forEach(item => {
          const projectId = item.getAttribute('data-id');
          const data = projectDatabase[projectId];
          if (!data) return;
          const label = item.querySelector('.item-hover-overlay span');
          const image = item.querySelector('img');
          if (label) label.textContent = data.tabTitle || data.title;
          if (image) image.alt = data.tabTitle || data.title;
        });
      }

      function renderPage(projectId) {
        const data = projectDatabase[projectId];
        const content = projectContent[projectId] || {};
        const labels = interfaceText[currentLanguage];
        if (!data) return;
        currentProjectId = projectId;
        wrapper.classList.add('content-fade');

        const titleHtml = `<div class="project-title-area"><h2>${escapeHtml(data.title)}</h2><div class="sub-tag">${escapeHtml(data.tag)}</div></div>`;
        let html;

        if (projectId === 'aboutme') {
          const blocks = content.blocks || [];
          const firstHeadingIndex = blocks.findIndex(block => block.kind === 'heading');
          const resumeHeadingIndex = blocks.findIndex(block =>
            block.kind === 'heading' && /^(?:简历|Resume)$/i.test((block.text || '').trim())
          );
          const resumeEndIndex = resumeHeadingIndex < 0
            ? -1
            : blocks.findIndex((block, index) => index > resumeHeadingIndex && block.kind === 'heading');
          const introEndIndex = resumeHeadingIndex >= 0 ? resumeHeadingIndex : firstHeadingIndex;
          const introBlocks = introEndIndex < 0 ? blocks : blocks.slice(0, introEndIndex);
          const resumeBlocks = resumeHeadingIndex < 0
            ? []
            : blocks.slice(resumeHeadingIndex + 1, resumeEndIndex < 0 ? blocks.length : resumeEndIndex);
          const remainingBlocks = resumeHeadingIndex >= 0
            ? (resumeEndIndex < 0 ? [] : blocks.slice(resumeEndIndex))
            : (firstHeadingIndex < 0 ? [] : blocks.slice(firstHeadingIndex));
          const introHtml = introBlocks.map(block => renderBlock(block, { sectionTitle: '' })).join('');
          const resumeHtml = resumeBlocks.map(block => renderBlock(block, { sectionTitle: '' })).join('');
          const rendered = renderContentBlocks(remainingBlocks, projectId);
          const photoHtml = content.hero
            ? `<div class="showcase-block about-photo"><img src="${escapeHtml(content.hero.src)}" alt="${escapeHtml(content.hero.caption)}" loading="eager"></div>`
            : '';
          html = `<div class="about-page">${titleHtml}<div class="about-intro">${photoHtml}<div class="about-copy">${introHtml}${resumeHtml}</div></div><div class="detail-section">${rendered.html}<div class="showcase-caption">${escapeHtml(data.caption)}</div></div></div>`;
        } else {
          const heroHtml = content.hero ? imageBlock(content.hero, true) : '';
          const lead = extractLead(content.blocks || []);
          const rendered = renderContentBlocks(lead.blocks, projectId);
          const leadHtml = lead.html ? `<div class="project-lede">${lead.html}</div>` : '';
          html = `${titleHtml}${leadHtml}${heroHtml}
            <div class="spec-table-mini">
              <div class="spec-cell" data-index="01"><h3>${escapeHtml(labels.projectType)}</h3><p>${escapeHtml(data.type)}</p></div>
              <div class="spec-cell" data-index="02"><h3>${escapeHtml(labels.responsibilities)}</h3><p>${escapeHtml(data.role)}</p></div>
              <div class="spec-cell" data-index="03"><h3>${escapeHtml(labels.period)}</h3><p>${escapeHtml(data.time)}</p></div>
              ${statusCardHtml(data, labels)}
            </div>
            <div class="project-reading-layout">
              ${quickNavHtml(rendered.toc, labels.toc)}
              <div class="detail-section">${rendered.html}<div class="showcase-caption">${escapeHtml(data.caption)}</div></div>
            </div>`;
        }

        setTimeout(() => {
          wrapper.innerHTML = html;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0;
          bindMediaCarousels(wrapper);
          bindTableOfContents();
        }, 150);
      }

      function bindTableOfContents() {
        if (tocObserver) tocObserver.disconnect();
        if (tocVisibilityCleanup) {
          tocVisibilityCleanup();
          tocVisibilityCleanup = null;
        }
        const links = Array.from(wrapper.querySelectorAll('.quick-nav a[data-section]'));
        if (!links.length) return;

        const quickNav = wrapper.querySelector('.quick-nav');
        const detailSection = wrapper.querySelector('.detail-section');
        let visibilityFrame = 0;
        const updateTocVisibility = () => {
          visibilityFrame = 0;
          if (!quickNav || !detailSection) return;
          if (window.matchMedia('(max-width: 1280px)').matches) {
            quickNav.classList.add('is-visible');
            return;
          }
          const panelRect = rightPanel.getBoundingClientRect();
          const detailRect = detailSection.getBoundingClientRect();
          const revealLine = panelRect.top + panelRect.height * 0.36;
          const isReadingBody = detailRect.top <= revealLine && detailRect.bottom > panelRect.top + 96;
          quickNav.classList.toggle('is-visible', isReadingBody);
        };
        const scheduleTocVisibility = () => {
          if (!visibilityFrame) visibilityFrame = requestAnimationFrame(updateTocVisibility);
        };
        rightPanel.addEventListener('scroll', scheduleTocVisibility, { passive: true });
        window.addEventListener('resize', scheduleTocVisibility);
        tocVisibilityCleanup = () => {
          rightPanel.removeEventListener('scroll', scheduleTocVisibility);
          window.removeEventListener('resize', scheduleTocVisibility);
          if (visibilityFrame) cancelAnimationFrame(visibilityFrame);
        };
        scheduleTocVisibility();

        links.forEach(link => link.addEventListener('click', event => {
          event.preventDefault();
          const target = wrapper.querySelector(`#${CSS.escape(link.dataset.section)}`);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }));

        const linkById = new Map(links.map(link => [link.dataset.section, link]));
        tocObserver = new IntersectionObserver(entries => {
          const visible = entries.filter(entry => entry.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (!visible.length) return;
          links.forEach(link => link.classList.remove('active'));
          const active = linkById.get(visible[0].target.id);
          if (active) active.classList.add('active');
        }, { root: rightPanel, rootMargin: '-8% 0px -76% 0px', threshold: 0 });
        wrapper.querySelectorAll('.content-heading[id]').forEach(heading => tocObserver.observe(heading));
      }

      async function activateLanguage(language, preserveScroll = false) {
        currentLanguage = language === 'en' ? 'en' : 'zh';
        saveLanguage(currentLanguage);
        const scrollPosition = rightPanel.scrollTop;
        const siteContent = await window.loadSiteContent(projectIds, currentLanguage);
        projectDatabase = siteContent.database || {};
        projectContent = siteContent.content || {};
        updateInterface();
        renderPage(currentProjectId);
        if (preserveScroll) {
          setTimeout(() => { rightPanel.scrollTop = scrollPosition; }, 170);
        }
      }

      items.forEach(item => item.addEventListener('click', () => {
        if (item.classList.contains('active')) return;
        items.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        renderPage(item.getAttribute('data-id'));
      }));

      languageToggle.addEventListener('change', () => {
        activateLanguage(languageToggle.checked ? 'en' : 'zh', true);
      });

      await activateLanguage(currentLanguage);
    });
  </script>
</body>
</html>

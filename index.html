      padding: 0;
    }

      display: flex;
      flex-direction: column;
      overflow: hidden;

      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    
    /* 顶部控制单元面板 */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    /* --- 双语滑块按键样式 --- */
    .lang-switch-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-label {
      font-size: 11px;
      font-weight: 800;
      color: #000000;
      letter-spacing: 1px;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider-knob {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #222222;
      transition: .3s cubic-bezier(0.25, 1, 0.5, 1);
      border-radius: 24px;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .slider-knob:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #ff5500;
      transition: .3s cubic-bezier(0.25, 1, 0.5, 1);
      border-radius: 50%;
    }
    input:checked + .slider-knob {
      background-color: #ffffff;
    }
    input:checked + .slider-knob:before {
      transform: translateX(26px);
      background-color: #ff5500;
    }

    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #2a2a2a;
    }

    /* --- 3. 左侧选项卡栏 --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #1a1a1a;
      background-color: #1a1a1a; 
      z-index: 50;
      perspective: 800px; 
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3); 
    }
    
    .project-item {
      height: 16.66%; 
      width: 108%; 
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      background-color: #222222;
      overflow: visible;
      opacity: 1; 
      
      transform: translateX(-7.4%);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      
      /* 退回与状态恢复动画 */
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.3s ease;
    }
    .project-item:last-child {
      border-bottom: none;
    }
    
    /* 鼠标悬停划出 */
    .project-item:hover {
      transform: translateX(0);
      z-index: 60; 
      box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5); 
      transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .project-item.active {
      z-index: 55; 
    }
    
    /* 3D 卡牌联动容器 */
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      border: 0px solid transparent;
      /* 将缩放与倾斜的过渡交由 JS 引擎控制，确保瞬时点击无延迟感 */
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), border 0.25s ease;
    }
    
    /* 高亮橙色描边 */
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 2px solid #ff5500; 
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      display: block;
      filter: none; 
    }

    /* 文本遮罩层 */
    .item-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.2) 100%); 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 15px;
      text-align: center;
      opacity: 1; 
      pointer-events: none;
      transition: background 0.25s ease;
    }
    
    .project-item:hover .item-hover-overlay,
    .project-item.active .item-hover-overlay {
      background: rgba(0, 0, 0, 0.65); 
    }
    
    .item-hover-overlay span {
      color: #ffffff; 
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5); 
      transition: color 0.25s ease;
    }

    /* 悬停或选中状态下文字变橙 */
    .project-item:hover .item-hover-overlay span,
    .project-item.active .item-hover-overlay span {
      color: #ff5500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* --- 4. 右侧展示区 --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #333333; 
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    /* 详情页排版包装器 */
    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    /* 大标题与参数表 */
    .project-title-area h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #ffffff; 
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #222222; 
      padding: 22px;
      border: 1px solid #444444;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .spec-cell p {
      font-size: 13.5px;
      color: #eeeeee;
      font-weight: 500;

      font-weight: 700;

      line-height: 1.8;

      background: #222222;

      overflow: hidden;

      height: auto;
    }
    .showcase-caption {
      font-size: 11.5px;
      color: #999999;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>

            ]
          }
        }
      }
    };

    let currentLanguage = "ZH";

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');
      const langToggle = document.getElementById('langToggle');

      /* ===================================================
         1. 高度拟真 3D 悬停扭曲与物理按压点击引擎
         =================================================== */
      function applyDynamicPhysicsEngine(itemElement, cardElement, maxRotate = 48, defaultScale = 1.08) {
        let isPressed = false;
        let lastRotateX = 0;
        let lastRotateY = 0;

        // 鼠标在卡片内移动时：计算 3D 倾斜
        itemElement.addEventListener('mousemove', (e) => {
          const rect = itemElement.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          
          lastRotateX = yc * -maxRotate; 
          lastRotateY = xc * maxRotate;
          
          // 如果当前处于按下状态，保持缩小的比例，否则维持悬停放大比例
          const currentScale = isPressed ? 0.94 : defaultScale;
          
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(${currentScale}) rotateX(${lastRotateX}deg) rotateY(${lastRotateY}deg)`;
          });
        });
        
        // 鼠标按下时：卡片迅速向里陷（缩小，营造放远效果）
        itemElement.addEventListener('mousedown', () => {
          isPressed = true;
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(0.94) rotateX(${lastRotateX}deg) rotateY(${lastRotateY}deg)`;
          });
        });

        // 鼠标松开或移出时：恢复比例
        const releaseCard = () => {
          if (!isPressed) return;
          isPressed = false;
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(${defaultScale}) rotateX(${lastRotateX}deg) rotateY(${lastRotateY}deg)`;
          });
        };

        itemElement.addEventListener('mouseup', releaseCard);
        
        itemElement.addEventListener('mouseleave', () => {
          isPressed = false;
          requestAnimationFrame(() => {
            cardElement.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });

        // 支持移动端触控按压反馈
        itemElement.addEventListener('touchstart', () => {
          isPressed = true;
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(0.94) rotateX(0deg) rotateY(0deg)`;
          });
        }, {passive: true});

        itemElement.addEventListener('touchend', () => {
          isPressed = false;
          requestAnimationFrame(() => {
            cardElement.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      
      items.forEach(item => {
        const card = item.querySelector('.project-item-card');
        applyDynamicPhysicsEngine(item, card, 48, 1.08); 
      });

      /* ===================================================
         2. 长轴内容构造组装器
         =================================================== */
      function renderLongProjectPage(projectId) {
        const currentPack = localizationData[currentLanguage];
        const data = currentPack.database[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>${currentPack.uiLabels.type}</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>${currentPack.uiLabels.role}</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>${currentPack.uiLabels.time}</h3><p>${data.time}</p></div>
          </div>
        `;

        const mediaIndices = { project1: 101, project2: 201, project3: 302, project4: 401, project5: 501, project6: 601 };
        const imageId = mediaIndices[projectId] || 101;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
                <img src="https://picsum.photos/1920/1080?random=${imageId}" alt="作品展示图片">
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      /* ===================================================
         3. 动态热插拔多语言 运行时切换控制单元
         =================================================== */
      function executeLanguageSwap(targetLanguage) {
        currentLanguage = targetLanguage;
        const currentPack = localizationData[currentLanguage];

        document.getElementById('headerName').textContent = currentPack.header.name;
        document.getElementById('headerTitle').textContent = currentPack.header.title;

        const navSpans = document.querySelectorAll('.item-hover-overlay span');
        navSpans.forEach(span => {
          const key = span.getAttribute('data-key');
          if (key && currentPack.nav[key]) {
            span.innerHTML = currentPack.nav[key];
          }
        });

        const activeItem = document.querySelector('.project-item.active');
        if (activeItem) {
          renderLongProjectPage(activeItem.getAttribute('data-id'));
        }
      }

      langToggle.addEventListener('change', (e) => {
        executeLanguageSwap(e.target.checked ? "EN" : "ZH");
      });

      /* ===================================================
         4. 选项卡联动切换点击监听
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      // 初始化启动：默认加载中文状态下页面视图
      executeLanguageSwap("ZH");
    });
  </script>
</body>
</html>
